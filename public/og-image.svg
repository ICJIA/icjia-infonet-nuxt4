<?xml version="1.0" encoding="UTF-8"?>
<!--
  InfoNet Open Graph / Twitter card source.
  Edit this file, then run `pnpm og:build` to regenerate public/og-image.png.

  HARD RULE: font-family must be "sans-serif" only (no named fonts) —
  librsvg, which Sharp uses to rasterise SVG on Linux CI, silently fails
  to render named font families. Verified: v6 migration checklist Rule #5.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d4474"/>
      <stop offset="1" stop-color="#0a3050"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c5d5e8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#c5d5e8" stop-opacity="1"/>
      <stop offset="1" stop-color="#c5d5e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="660" height="44" rx="6" fill="#1e5a8a"/>
    <text x="20" y="30" font-family="sans-serif" font-size="18" font-weight="700" fill="#ffffff">
      ILLINOIS CRIMINAL JUSTICE INFORMATION AUTHORITY
    </text>
  </g>
  <text x="80" y="320" font-family="sans-serif" font-size="172" font-weight="900" fill="#ffffff">
    INFONET
  </text>
  <line x1="80" y1="370" x2="1120" y2="370" stroke="url(#rule)" stroke-width="2"/>
  <text x="80" y="445" font-family="sans-serif" font-size="34" font-weight="500" fill="#c5d5e8">
    Statewide victim-services data
  </text>
  <text x="80" y="490" font-family="sans-serif" font-size="34" font-weight="500" fill="#c5d5e8">
    collection &amp; reporting system
  </text>
  <text x="80" y="570" font-family="sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    infonet.icjia.illinois.gov
  </text>
</svg>
